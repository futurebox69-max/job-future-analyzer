<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HORIZON - Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600;700&display=swap');

  :root {
    --navy-900: #0a1628;
    --navy-800: #0f2140;
    --navy-700: #162d54;
    --navy-600: #1e3a6a;
    --navy-500: #2a4f8f;
    --gold-500: #c9a84c;
    --gold-400: #d4b85c;
    --gold-300: #e0c96e;
    --gold-200: #f0dda0;
    --gold-100: #faf3e0;
    --warm-white: #faf8f5;
    --text-primary: #1a1a2e;
    --text-muted: #8a8a9a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    min-height: 100vh;
    background: var(--navy-900);
    display: flex;
    flex-direction: column;
    max-width: 440px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  @media (min-width: 441px) {
    body { box-shadow: 0 0 60px rgba(0,0,0,0.3); }
  }

  /* Top visual */
  .login-visual {
    flex: 0 0 auto;
    height: 40vh;
    min-height: 280px;
    background: linear-gradient(180deg, var(--navy-900) 0%, var(--navy-800) 60%, var(--navy-700) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle radial glow */
  .login-visual::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Cross / Horizon symbol */
  .horizon-symbol {
    width: 60px; height: 60px;
    position: relative;
    margin-bottom: 24px;
  }
  .horizon-symbol::before {
    content: '';
    position: absolute;
    top: 50%; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-500), transparent);
    transform: translateY(-50%);
  }
  .horizon-symbol::after {
    content: '';
    position: absolute;
    left: 50%; top: 10%;
    width: 2px; height: 80%;
    background: linear-gradient(180deg, transparent, var(--gold-500), transparent);
    transform: translateX(-50%);
  }

  .brand-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 6px;
    position: relative;
    z-index: 1;
  }
  .brand-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 8px;
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
  }

  /* Form area */
  .login-form-area {
    flex: 1;
    background: var(--warm-white);
    border-radius: 28px 28px 0 0;
    padding: 36px 24px 40px;
    margin-top: -20px;
    position: relative;
    z-index: 2;
  }

  .form-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .form-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  /* Input groups */
  .input-group {
    margin-bottom: 16px;
  }
  .input-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--navy-600);
    margin-bottom: 6px;
    display: block;
  }
  .input-field {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e0dcd6;
    border-radius: 12px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    background: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .input-field::placeholder {
    color: #c0bdb6;
  }
  .input-field:focus {
    border-color: var(--gold-500);
    box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.12);
  }

  /* Remember & forgot */
  .form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 4px 0 24px;
  }
  .remember-me {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
  }
  .remember-me input {
    accent-color: var(--gold-500);
  }
  .forgot-link {
    font-size: 13px;
    color: var(--navy-500);
    text-decoration: none;
    font-weight: 500;
  }

  /* Login button */
  .login-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--navy-800), var(--navy-700));
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }
  .login-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, var(--gold-500), var(--gold-400));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .login-btn:hover::before {
    opacity: 1;
  }
  .login-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(10,22,40,0.25);
  }
  .login-btn:active {
    transform: translateY(0);
  }
  .login-btn span {
    position: relative;
    z-index: 1;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e0dcd6;
  }
  .divider span {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Google login */
  .google-btn {
    width: 100%;
    padding: 14px;
    border: 1.5px solid #e0dcd6;
    border-radius: 14px;
    background: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
  }
  .google-btn:hover {
    background: #f8f6f2;
    border-color: #c0bdb6;
  }
  .google-icon {
    width: 18px; height: 18px;
  }

  /* Footer */
  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .login-footer a {
    color: var(--navy-500);
    text-decoration: none;
    font-weight: 500;
  }

  /* Church branding */
  .church-badge {
    text-align: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid #e0dcd6;
  }
  .church-badge span {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<!-- Visual Header -->
<div class="login-visual">
  <div class="horizon-symbol"></div>
  <div class="brand-name">HORIZON</div>
  <div class="brand-tagline">매일의 지평을 넓히다</div>
</div>

<!-- Form Area -->
<div class="login-form-area">
  <div class="form-title">로그인</div>
  <div class="form-subtitle">오늘의 카드가 준비되어 있습니다</div>

  <div class="input-group">
    <label class="input-label">이메일</label>
    <input type="email" class="input-field" placeholder="이메일 주소를 입력하세요">
  </div>

  <div class="input-group">
    <label class="input-label">비밀번호</label>
    <input type="password" class="input-field" placeholder="비밀번호를 입력하세요">
  </div>

  <div class="form-options">
    <label class="remember-me">
      <input type="checkbox"> 로그인 유지
    </label>
    <a href="#" class="forgot-link">비밀번호 찾기</a>
  </div>

  <button class="login-btn" onclick="handleLogin()">
    <span>로그인</span>
  </button>

  <div class="divider"><span>또는</span></div>

  <button class="google-btn">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google 계정으로 로그인
  </button>

  <div class="login-footer">
    계정이 없으신가요? <a href="#">담당 사역자에게 문의</a>
  </div>

  <div class="church-badge">
    <span>LoginFuture Ministry</span>
  </div>
</div>

<script>
function handleLogin() {
  const btn = document.querySelector('.login-btn');
  btn.innerHTML = '<span>로그인 중...</span>';
  setTimeout(() => {
    btn.innerHTML = '<span>로그인</span>';
  }, 2000);
}
</script>

</body>
</html>
