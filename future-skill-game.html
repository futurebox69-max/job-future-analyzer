<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>미래역량 시뮬레이터</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

:root {
  --bg: #08080f;
  --surface: #12121c;
  --surface2: #1a1a2a;
  --border: rgba(108,99,255,0.15);
  --primary: #6C63FF;
  --primary-glow: rgba(108,99,255,0.3);
  --accent: #FF6B6B;
  --accent2: #4ECDC4;
  --accent3: #FFE66D;
  --accent4: #A78BFA;
  --accent5: #F472B6;
  --accent6: #34D399;
  --text: #E8E6F0;
  --text-dim: #8888A0;
  --text-bright: #FFFFFF;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== SCREENS ===== */
.screen { display:none; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; }

/* ===== INTRO SCREEN ===== */
#intro {
  align-items:center; justify-content:center;
  text-align:center; padding:24px;
  position:relative; overflow:hidden;
}
#intro::before {
  content:''; position:absolute; width:500px; height:500px;
  background:radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
  top:30%; left:50%; transform:translate(-50%,-50%);
  animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:0.3; transform:translate(-50%,-50%) scale(1); }
  50% { opacity:0.6; transform:translate(-50%,-50%) scale(1.2); }
}

.intro-badge {
  background: rgba(108,99,255,0.15);
  color: var(--primary);
  font-size:12px; font-weight:600;
  padding:6px 16px; border-radius:20px;
  display:inline-block; margin-bottom:20px;
  position:relative; z-index:1;
  border:1px solid rgba(108,99,255,0.3);
}
.intro-title {
  font-size:36px; font-weight:900;
  line-height:1.3; margin-bottom:12px;
  position:relative; z-index:1;
  background: linear-gradient(135deg, #fff, var(--primary), var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.intro-sub {
  font-size:15px; color:var(--text-dim);
  line-height:1.6; margin-bottom:36px;
  position:relative; z-index:1;
  max-width:320px;
}
.intro-stats {
  display:flex; gap:24px; margin-bottom:40px;
  position:relative; z-index:1;
}
.intro-stat {
  text-align:center;
}
.intro-stat-num {
  font-size:28px; font-weight:900; color:var(--accent3);
}
.intro-stat-label {
  font-size:11px; color:var(--text-dim); margin-top:2px;
}

.start-btn {
  position:relative; z-index:1;
  padding:18px 48px; border:none; border-radius:16px;
  background: linear-gradient(135deg, var(--primary), #8B5CF6);
  color:#fff; font-size:18px; font-weight:700;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; transition:all 0.3s;
  box-shadow: 0 8px 32px rgba(108,99,255,0.4);
}
.start-btn:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(108,99,255,0.5); }
.start-btn:active { transform:translateY(0); }

.intro-note {
  position:relative; z-index:1;
  margin-top:16px; font-size:12px; color:var(--text-dim);
}

/* ===== GAME SCREEN ===== */
#game { padding:0; }

.game-header {
  padding:16px 20px;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid var(--border);
  background: var(--surface);
}
.game-progress {
  flex:1; margin:0 16px;
}
.progress-bar {
  height:6px; background:var(--surface2); border-radius:3px; overflow:hidden;
}
.progress-fill {
  height:100%; border-radius:3px;
  background: linear-gradient(90deg, var(--primary), var(--accent2));
  transition: width 0.5s ease;
}
.game-round {
  font-size:12px; color:var(--text-dim); white-space:nowrap;
}
.game-timer {
  font-size:20px; font-weight:700; color:var(--accent);
  min-width:40px; text-align:right;
  font-variant-numeric: tabular-nums;
}
.game-timer.warning { animation: timerBlink 0.5s ease infinite; }
@keyframes timerBlink {
  0%,100% { opacity:1; } 50% { opacity:0.4; }
}

.game-body {
  flex:1; padding:20px; display:flex; flex-direction:column;
  max-width:480px; margin:0 auto; width:100%;
}

/* Scenario card */
.scenario-card {
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:20px; padding:24px;
  margin-bottom:20px;
  position:relative; overflow:hidden;
}
.scenario-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--primary), var(--accent2), var(--accent3));
}
.scenario-context {
  font-size:11px; color:var(--accent2); font-weight:600;
  text-transform:uppercase; letter-spacing:1.5px;
  margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.scenario-text {
  font-size:16px; line-height:1.7; font-weight:400;
  color:var(--text-bright);
}
.scenario-emoji {
  font-size:40px; margin-bottom:12px;
  display:block;
}

/* Choice buttons */
.choices {
  display:flex; flex-direction:column; gap:10px;
  flex:1;
}
.choice-btn {
  background: var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px; padding:16px 18px;
  text-align:left; cursor:pointer;
  transition:all 0.25s;
  display:flex; align-items:center; gap:14px;
  font-family:'Noto Sans KR',sans-serif;
}
.choice-btn:hover {
  border-color:var(--primary);
  background: rgba(108,99,255,0.08);
  transform:translateX(4px);
}
.choice-btn:active {
  transform:translateX(2px) scale(0.99);
}
.choice-btn.selected {
  border-color:var(--primary);
  background: rgba(108,99,255,0.15);
  box-shadow: 0 0 20px rgba(108,99,255,0.2);
}
.choice-key {
  width:32px; height:32px; border-radius:8px;
  background: rgba(108,99,255,0.15);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:var(--primary);
  flex-shrink:0;
}
.choice-text {
  font-size:14px; line-height:1.5; color:var(--text);
}

/* Feedback flash */
.feedback-flash {
  position:fixed; top:0; left:0; right:0; bottom:0;
  display:flex; align-items:center; justify-content:center;
  z-index:100; pointer-events:none;
  opacity:0; transition:opacity 0.3s;
}
.feedback-flash.show { opacity:1; }
.feedback-flash .fb-content {
  background: var(--surface);
  border:2px solid var(--primary);
  border-radius:20px; padding:24px 32px;
  text-align:center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.fb-emoji { font-size:48px; margin-bottom:8px; }
.fb-text { font-size:14px; color:var(--text); line-height:1.5; }
.fb-skill {
  margin-top:8px; font-size:12px; color:var(--accent2);
  font-weight:600;
}

/* ===== RESULT SCREEN ===== */
#result {
  align-items:center; padding:24px;
  min-height:100vh;
}

.result-header {
  text-align:center; margin-bottom:32px; margin-top:20px;
}
.result-badge {
  display:inline-block; padding:6px 16px;
  background:rgba(78,205,196,0.15); color:var(--accent2);
  border-radius:20px; font-size:12px; font-weight:600;
  border:1px solid rgba(78,205,196,0.3);
  margin-bottom:12px;
}
.result-archetype {
  font-size:48px; margin-bottom:8px;
}
.result-title {
  font-size:28px; font-weight:900;
  background: linear-gradient(135deg, #fff, var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.result-subtitle {
  font-size:14px; color:var(--text-dim); line-height:1.6;
  max-width:320px; margin:0 auto;
}

/* Radar chart */
.radar-container {
  width:100%; max-width:360px; margin:0 auto 24px;
  background:var(--surface); border-radius:20px;
  padding:24px; border:1px solid var(--border);
}
.radar-title {
  font-size:13px; font-weight:600; color:var(--text);
  margin-bottom:16px; text-align:center;
}

/* Score bars (alternative to SVG radar) */
.score-bars { display:flex; flex-direction:column; gap:14px; }
.score-row {
  display:flex; align-items:center; gap:12px;
}
.score-icon { font-size:20px; width:28px; text-align:center; }
.score-info { flex:1; }
.score-name {
  font-size:12px; font-weight:500; color:var(--text);
  margin-bottom:4px;
  display:flex; justify-content:space-between;
}
.score-value { color:var(--accent2); font-weight:700; }
.score-track {
  height:8px; background:var(--surface2); border-radius:4px; overflow:hidden;
}
.score-fill {
  height:100%; border-radius:4px;
  transition: width 1.5s cubic-bezier(0.4,0,0.2,1);
}

/* Archetype card */
.archetype-card {
  width:100%; max-width:360px;
  background:var(--surface); border-radius:20px;
  padding:24px; border:1px solid var(--border);
  margin-bottom:20px;
}
.arch-section-title {
  font-size:11px; font-weight:600; color:var(--primary);
  text-transform:uppercase; letter-spacing:1.5px;
  margin-bottom:12px;
}
.arch-desc {
  font-size:14px; line-height:1.7; color:var(--text-dim);
  margin-bottom:16px;
}
.arch-tags {
  display:flex; flex-wrap:wrap; gap:6px;
}
.arch-tag {
  padding:5px 12px; border-radius:8px;
  font-size:11px; font-weight:500;
}

/* Strength/Growth */
.strength-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
  margin-bottom:16px;
}
.sg-card {
  padding:14px; border-radius:12px;
  border:1px solid var(--border);
}
.sg-card h4 {
  font-size:11px; font-weight:600; margin-bottom:8px;
  display:flex; align-items:center; gap:4px;
}
.sg-card p {
  font-size:12px; color:var(--text-dim); line-height:1.5;
}

/* Action buttons */
.result-actions {
  display:flex; gap:10px; width:100%; max-width:360px;
  margin-top:8px;
}
.result-btn {
  flex:1; padding:14px; border-radius:12px;
  font-size:14px; font-weight:600;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; transition:all 0.2s;
  text-align:center;
  border:none;
}
.result-btn-primary {
  background:linear-gradient(135deg, var(--primary), #8B5CF6);
  color:#fff;
  box-shadow:0 4px 16px rgba(108,99,255,0.3);
}
.result-btn-secondary {
  background:var(--surface);
  color:var(--text);
  border:1.5px solid var(--border);
}

/* ===== RESPONSIVE ===== */
@media (min-width:481px) {
  body { max-width:480px; margin:0 auto; box-shadow:0 0 60px rgba(0,0,0,0.3); }
}

/* ===== ANIMATIONS ===== */
@keyframes slideUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
.animate-in { animation: slideUp 0.4s ease forwards; }

@keyframes scoreGrow {
  from { width:0 !important; }
}
.score-animate { animation: scoreGrow 1.5s cubic-bezier(0.4,0,0.2,1) forwards; }
</style>
</head>
<body>

<!-- FEEDBACK FLASH -->
<div class="feedback-flash" id="feedback">
  <div class="fb-content">
    <div class="fb-emoji" id="fbEmoji"></div>
    <div class="fb-text" id="fbText"></div>
    <div class="fb-skill" id="fbSkill"></div>
  </div>
</div>

<!-- ===== INTRO ===== -->
<div class="screen active" id="intro">
  <div class="intro-badge">AI 시대 역량 시뮬레이터</div>
  <h1 class="intro-title">나는 미래에<br>살아남을까?</h1>
  <p class="intro-sub">
    지루한 설문은 없습니다.<br>
    10개의 상황이 주어집니다.<br>
    당신의 선택이 역량을 드러냅니다.
  </p>
  <div class="intro-stats">
    <div class="intro-stat">
      <div class="intro-stat-num">10</div>
      <div class="intro-stat-label">시나리오</div>
    </div>
    <div class="intro-stat">
      <div class="intro-stat-num">6</div>
      <div class="intro-stat-label">역량 차원</div>
    </div>
    <div class="intro-stat">
      <div class="intro-stat-num">3분</div>
      <div class="intro-stat-label">소요 시간</div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">시뮬레이션 시작</button>
  <div class="intro-note">선택에 정답은 없습니다. 직감을 따르세요.</div>
</div>

<!-- ===== GAME ===== -->
<div class="screen" id="game">
  <div class="game-header">
    <div class="game-round" id="roundLabel">1 / 10</div>
    <div class="game-progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="game-timer" id="timer">15</div>
  </div>
  <div class="game-body">
    <div class="scenario-card animate-in" id="scenarioCard">
      <div class="scenario-context" id="scenarioContext"></div>
      <span class="scenario-emoji" id="scenarioEmoji"></span>
      <div class="scenario-text" id="scenarioText"></div>
    </div>
    <div class="choices" id="choices"></div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div class="screen" id="result">
  <div class="result-header">
    <div class="result-badge">분석 완료</div>
    <div class="result-archetype" id="resultEmoji"></div>
    <h2 class="result-title" id="resultTitle"></h2>
    <p class="result-subtitle" id="resultSubtitle"></p>
  </div>

  <div class="radar-container">
    <div class="radar-title">6차원 미래역량 프로필</div>
    <div class="score-bars" id="scoreBars"></div>
  </div>

  <div class="archetype-card">
    <div class="arch-section-title">강점 & 성장 포인트</div>
    <div class="strength-grid" id="strengthGrid"></div>
    <div class="arch-section-title" style="margin-top:16px">추천 역량 개발</div>
    <div class="arch-desc" id="archAdvice"></div>
    <div class="arch-tags" id="archTags"></div>
  </div>

  <div class="result-actions">
    <button class="result-btn result-btn-primary" onclick="shareResult()">결과 공유</button>
    <button class="result-btn result-btn-secondary" onclick="retryGame()">다시 도전</button>
  </div>
</div>

<script>
// ===== 6 FUTURE COMPETENCIES =====
const SKILLS = {
  structural: { name: '구조적 사고', icon: '🧩', color: '#6C63FF', desc: '복잡한 문제의 패턴과 구조를 파악하는 능력' },
  creative:   { name: '창의적 재설계', icon: '🎨', color: '#FF6B6B', desc: '기존 틀을 깨고 새로운 해법을 만드는 능력' },
  emotional:  { name: '감성 연결', icon: '💫', color: '#F472B6', desc: '사람의 감정을 읽고 공감으로 연결하는 능력' },
  adaptive:   { name: '적응 민첩성', icon: '⚡', color: '#FFE66D', desc: '변화에 빠르게 대응하고 학습하는 능력' },
  ethical:    { name: '윤리적 판단', icon: '⚖️', color: '#A78BFA', desc: '기술과 인간 사이의 올바른 균형을 잡는 능력' },

    ]

  {

  },
  {

// ===== GAME STATE =====
let currentRound = 0;
let scores = { structural:0, creative:0, emotional:0, adaptive:0, ethical:0, collab:0 };
let timerInterval;
let timeLeft;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  currentRound = 0;
  scores = { structural:0, creative:0, emotional:0, adaptive:0, ethical:0, collab:0 };
  showScreen('game');
  loadRound();
}

function loadRound() {
  if (currentRound >= scenarios.length) {
    showResult();
    return;
  }

  const s = scenarios[currentRound];
  document.getElementById('roundLabel').textContent = `${currentRound+1} / ${scenarios.length}`;
  document.getElementById('progressFill').style.width = `${(currentRound/scenarios.length)*100}%`;
  document.getElementById('scenarioContext').innerHTML = `⚡ ${s.context}`;
  document.getElementById('scenarioEmoji').textContent = s.emoji;
  document.getElementById('scenarioText').textContent = s.text;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const keys = ['A','B','C','D'];
  s.choices.forEach((c, i) => {
    const btn = document.createElement('div');
    btn.className = 'choice-btn animate-in';
    btn.style.animationDelay = `${i*0.08}s`;
    btn.innerHTML = `
      <div class="choice-key">${keys[i]}</div>
      <div class="choice-text">${c.text}</div>
    `;
    btn.onclick = () => selectChoice(i);
    choicesEl.appendChild(btn);
  });

  // Timer
  timeLeft = 15;
  const timerEl = document.getElementById('timer');
  timerEl.textContent = timeLeft;
  timerEl.classList.remove('warning');
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;
    if (timeLeft <= 5) timerEl.classList.add('warning');
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      // Auto-select random if time runs out
      selectChoice(Math.floor(Math.random() * s.choices.length));
    }
  }, 1000);
}

function selectChoice(idx) {
  clearInterval(timerInterval);

  const s = scenarios[currentRound];
  const choice = s.choices[idx];

  // Add scores
  for (const [skill, pts] of Object.entries(choice.skills)) {
    scores[skill] += pts;
  }

  // Highlight selected
  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    if (i === idx) btn.classList.add('selected');
    btn.style.pointerEvents = 'none';
  });

  // Show feedback
  showFeedback(choice.fb, Object.keys(choice.skills));

  setTimeout(() => {
    currentRound++;
    loadRound();
  }, 1200);
}

function showFeedback(text, skillKeys) {
  const fb = document.getElementById('feedback');
  document.getElementById('fbEmoji').textContent = '✨';
  document.getElementById('fbText').textContent = text;
  document.getElementById('fbSkill').textContent = skillKeys.map(k => SKILLS[k].name).join(' + ');
  fb.classList.add('show');
  setTimeout(() => fb.classList.remove('show'), 1000);
}

function showResult() {
  showScreen('result');

  // Find top skill
  const maxScore = Math.max(...Object.values(scores));
  const topSkill = Object.entries(scores).find(([k,v]) => v === maxScore)[0];
  const arch = archetypes.find(a => a.id === topSkill);

  document.getElementById('resultEmoji').textContent = arch.emoji;
  document.getElementById('resultTitle').textContent = arch.title;
  document.getElementById('resultSubtitle').textContent = arch.subtitle;

  // Score bars
  const maxPossible = Math.max(...Object.values(scores)) || 1;
  const barsEl = document.getElementById('scoreBars');
  barsEl.innerHTML = '';

  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  sorted.forEach(([key, val], i) => {
    const skill = SKILLS[key];
    const pct = Math.round((val / maxPossible) * 100);
    const row = document.createElement('div');
    row.className = 'score-row animate-in';
    row.style.animationDelay = `${i*0.1}s`;
    row.innerHTML = `
      <div class="score-icon">${skill.icon}</div>
      <div class="score-info">
        <div class="score-name">
          <span>${skill.name}</span>
          <span class="score-value">${pct}%</span>
        </div>
        <div class="score-track">
          <div class="score-fill score-animate" style="width:${pct}%; background:${skill.color}"></div>
        </div>
      </div>
    `;
    barsEl.appendChild(row);
  });

  // Strengths & Growth
  const top2 = sorted.slice(0, 2);
  const bottom2 = sorted.slice(-2);
  const grid = document.getElementById('strengthGrid');
  grid.innerHTML = `
    <div class="sg-card" style="background:rgba(78,205,196,0.06); border-color:rgba(78,205,196,0.2);">
      <h4 style="color:var(--accent2)">💪 핵심 강점</h4>
      <p>${top2.map(([k]) => SKILLS[k].name).join(', ')}</p>
    </div>
    <div class="sg-card" style="background:rgba(255,107,107,0.06); border-color:rgba(255,107,107,0.2);">
      <h4 style="color:var(--accent)">🌱 성장 포인트</h4>
      <p>${bottom2.map(([k]) => SKILLS[k].name).join(', ')}</p>
    </div>
  `;

  // Advice
  document.getElementById('archAdvice').textContent = arch.desc;

  // Tags
  const tags = document.getElementById('archTags');
  const tagData = [
    { text: `#${arch.title}`, bg: 'rgba(108,99,255,0.15)', color: '#6C63FF' },
    { text: `#${SKILLS[top2[0][0]].name}`, bg: 'rgba(78,205,196,0.15)', color: '#4ECDC4' },
    { text: '#AI시대_생존역량', bg: 'rgba(255,230,109,0.15)', color: '#FFE66D' }
  ];
  tags.innerHTML = tagData.map(t =>
    `<span class="arch-tag" style="background:${t.bg}; color:${t.color}">${t.text}</span>`
  ).join('');
}

function shareResult() {
  const topSkill = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const arch = archetypes.find(a => a.id === topSkill);
  const text = `나의 미래역량 유형: ${arch.emoji} ${arch.title}\n${arch.subtitle}\n\n나도 테스트하기 →`;
  if (navigator.share) {
    navigator.share({ title: '미래역량 시뮬레이터', text });
  } else {
    navigator.clipboard.writeText(text);
    alert('결과가 클립보드에 복사됐습니다!');
  }
}

function retryGame() {
  showScreen('intro');
}
